<!doctype html><div class="lake-content" typography="classic"><p id="u098e6807" class="ne-p"><span class="ne-text">2022年3月15日，马玉国被任命为北大附中党委副书记、校长。[^1]</span></p><p id="u2d2010c7" class="ne-p"><span class="ne-text" style="color: rgb(51, 51, 51); font-size: 14px"></span></p><p id="u29dd0927" class="ne-p"><span class="ne-text">马玉国，男，汉族，1972年2月生，中共党员，教授，博士生导师。</span></p><p id="ucb9ed4bb" class="ne-p"><span class="ne-text">现任北京大学副教务长、</span><a href="https://baike.baidu.com/item/%E5%8C%97%E4%BA%AC%E5%A4%A7%E5%AD%A6%E9%99%84%E5%B1%9E%E4%B8%AD%E5%AD%A6/455312?fromModule=lemma_inlink" data-href="https://baike.baidu.com/item/%E5%8C%97%E4%BA%AC%E5%A4%A7%E5%AD%A6%E9%99%84%E5%B1%9E%E4%B8%AD%E5%AD%A6/455312?fromModule=lemma_inlink" target="_blank" class="ne-link"><span class="ne-text">北京大学附属中学</span></a><span class="ne-text">党委副书记、校长；北京大学分析测试中心主任，北京大学软物质科学与工程中心副主任。中国科协第九次代表大会代表，</span><a href="https://baike.baidu.com/item/%E4%B8%AD%E5%9B%BD%E5%8C%96%E5%AD%A6%E4%BC%9A/1787257?fromModule=lemma_inlink" data-href="https://baike.baidu.com/item/%E4%B8%AD%E5%9B%BD%E5%8C%96%E5%AD%A6%E4%BC%9A/1787257?fromModule=lemma_inlink" target="_blank" class="ne-link"><span class="ne-text">中国化学会</span></a><span class="ne-text">理事。[^2]</span></p><p id="u277cc096" class="ne-p"><span class="ne-text"></span></p><p id="u921a41fb" class="ne-p"><span class="ne-text"></span></p><p id="uf64e3432" class="ne-p"><span class="ne-text">[^1]: </span><a href="https://xxgk.pku.edu.cn/gksx/rssz/zcgbrm/1065xbxxgk144681.htm" data-href="https://xxgk.pku.edu.cn/gksx/rssz/zcgbrm/1065xbxxgk144681.htm" target="_blank" class="ne-link"><span class="ne-text">https://xxgk.pku.edu.cn/gksx/rssz/zcgbrm/1065xbxxgk144681.htm</span></a></p><p id="u43ade93a" class="ne-p"><span class="ne-text">[^2]: </span><a href="https://baike.baidu.com/item/%E9%A9%AC%E7%8E%89%E5%9B%BD/6465203" data-href="https://baike.baidu.com/item/%E9%A9%AC%E7%8E%89%E5%9B%BD/6465203" target="_blank" class="ne-link"><span class="ne-text">https://baike.baidu.com/item
